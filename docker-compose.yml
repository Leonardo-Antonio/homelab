services:
  backend:
    build:
      context: ./backend
    container_name: homelab-backend
    restart: unless-stopped
    environment:
      HTTP_ADDR: :18080
      DATABASE_PATH: /app/data/homelab.db
      PHOTO_STORAGE_DIR: /app/data/photos
      STORAGE_DIR: /app/data/storage
      ALLOWED_ORIGIN: "*"
      # SSH web terminal. Disabled by default; set SSH_ENABLED=true and the
      # target/credentials to expose the Terminal page. Credentials stay
      # server-side. See doc_ssh.md for the full configuration reference.
      SSH_ENABLED: ${SSH_ENABLED:-false}
      SSH_HOST: ${SSH_HOST:-127.0.0.1}
      SSH_PORT: ${SSH_PORT:-22}
      SSH_USER: ${SSH_USER:-}
      SSH_PASSWORD: ${SSH_PASSWORD:-}
      SSH_INSECURE_IGNORE_HOST_KEY: ${SSH_INSECURE_IGNORE_HOST_KEY:-false}
      # Network monitor. The backend runs in host network mode so /proc/net/arp
      # reflects the server network namespace. The API uses port 18080 to avoid
      # collisions with common services on 8080; the public frontend remains on
      # port 8081.
      NETWORK_ARP_PATH: ${NETWORK_ARP_PATH:-/proc/net/arp}
      NETWORK_DHCP_LEASE_PATH: ${NETWORK_DHCP_LEASE_PATH:-}
      NETWORK_DNS_LOG_PATH: ${NETWORK_DNS_LOG_PATH:-}
      NETWORK_BLOCKLIST_PATH: ${NETWORK_BLOCKLIST_PATH:-/app/data/network-blocklist.txt}
    volumes:
      - ./backend/data:/app/data
      - /var/log:/host/var/log:ro
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18080/healthz >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_CAMERA_STREAM_URL: ${VITE_CAMERA_STREAM_URL:-http://192.168.31.67/stream}
    container_name: homelab-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - homelab

networks:
  homelab:
    driver: bridge
